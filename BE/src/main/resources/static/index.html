<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlanbookAI - Hệ Thống Chấm Điểm Thông Minh 2025</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-slate-50 min-h-screen pb-20">

    <nav class="bg-blue-700 text-white shadow-lg p-4 mb-8">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold flex items-center gap-2">
                <i class="fas fa-robot"></i> PlanbookAI
            </h1>
            <span class="text-sm opacity-80">Hệ thống OCR & Trợ lý Giảng dạy 2025</span>
        </div>
    </nav>

    <div class="max-w-5xl mx-auto px-4 space-y-8">

        <div class="bg-white p-6 rounded-2xl shadow-sm border-t-4 border-purple-500">
            <h2 class="text-xl font-bold text-purple-700 mb-4 flex items-center gap-2">
                <i class="fas fa-key"></i> 1. Thiết Lập Đáp Án Mẫu
            </h2>
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <div class="md:col-span-1">
                    <label class="block text-sm font-semibold mb-1">Mã đề thi:</label>
                    <input type="text" id="newExamCode" placeholder="Ví dụ: 1032" 
                           class="w-full border p-2 rounded-lg focus:ring-2 focus:ring-purple-300 outline-none">
                </div>
                <div class="md:col-span-3">
                    <label class="block text-sm font-semibold mb-1">Cấu trúc đáp án (JSON):</label>
                    <textarea id="jsonAnswers" rows="3" 
                              class="w-full border p-2 rounded-lg font-mono text-xs focus:ring-2 focus:ring-purple-300 outline-none"
                              placeholder='{ "part_1": {"1":"A", "2":"C"}, "part_2": {"1":{"a":"Đ", "b":"S"}}, "part_3": {"1":"12.5"} }'></textarea>
                </div>
            </div>
            <button onclick="saveAnswers()" class="mt-4 bg-purple-600 hover:bg-purple-700 text-white px-6 py-2 rounded-xl font-bold transition-all shadow-md">
                Lưu Đáp Án Vào Hệ Thống
            </button>
        </div>

        <div class="bg-white p-6 rounded-2xl shadow-sm border-t-4 border-blue-500">
            <h2 class="text-xl font-bold text-blue-700 mb-4 flex items-center gap-2">
                <i class="fas fa-upload"></i> 2. Chấm Điểm Theo Folder
            </h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                <div class="p-4 bg-slate-50 rounded-xl border border-dashed border-slate-300 text-center">
                    <label class="block font-semibold mb-2">Chọn Mã Đề Cần Chấm:</label>
                    <input type="text" id="examCode" value="1032" class="border p-2 w-full rounded-lg text-center font-bold text-blue-600">
                </div>
                <div class="p-4 bg-slate-50 rounded-xl border border-dashed border-slate-300 text-center">
                    <label class="block font-semibold mb-2 text-blue-600 cursor-pointer hover:underline">
                        <i class="fas fa-folder-open"></i> Chọn Thư Mục Bài Thi
                        <input type="file" id="fileInput" multiple webkitdirectory directory class="hidden" onchange="updateFileCount()">
                    </label>
                    <p id="fileCountLabel" class="text-xs text-slate-500 mt-1 italic">Chưa chọn folder nào</p>
                </div>
            </div>
            <button onclick="uploadFiles()" id="btnAction" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl shadow-lg transition-all text-lg">
                <i class="fas fa-play-circle"></i> BẮT ĐẦU CHẤM ĐIỂM CẢ LỚP
            </button>
        </div>

        <div id="resultContainer" class="hidden space-y-6">
            <div class="flex justify-between items-center">
                <h2 class="text-2xl font-bold text-slate-800">Kết Quả Chi Tiết</h2>
                <div class="flex gap-3">
                    <button onclick="downloadExcel()" class="bg-green-600 text-white px-4 py-2 rounded-lg text-sm font-bold shadow hover:bg-green-700">
                        <i class="fas fa-file-excel"></i> Xuất Bảng Điểm Excel
                    </button>
                    <button onclick="generateClassReport()" class="bg-indigo-600 text-white px-4 py-2 rounded-lg text-sm font-bold shadow hover:bg-indigo-700">
                        <i class="fas fa-brain"></i> AI Tổng Kết Lớp
                    </button>
                </div>
            </div>

            <div class="bg-white rounded-2xl shadow-sm overflow-hidden border">
                <table class="w-full text-left">
                    <thead class="bg-slate-100 border-b">
                        <tr>
                            <th class="p-4 font-bold text-slate-600 text-sm">HỌC SINH</th>
                            <th class="p-4 font-bold text-slate-600 text-sm text-center">ĐIỂM</th>
                            <th class="p-4 font-bold text-slate-600 text-sm">NHẬN XÉT CỦA AI</th>
                            <th class="p-4 font-bold text-slate-600 text-sm text-center">TÁC VỤ</th>
                        </tr>
                    </thead>
                    <tbody id="resultBody">
                        </tbody>
                </table>
            </div>
        </div>

    </div>

    <script>
        // 1. Cập nhật nhãn số lượng file khi chọn
        function updateFileCount() {
            const files = document.getElementById('fileInput').files;
            document.getElementById('fileCountLabel').innerText = `Đã chọn ${files.length} bài thi`;
        }

        // 2. Lưu đáp án mẫu
        async function saveAnswers() {
            const examCode = document.getElementById('newExamCode').value;
            const jsonStr = document.getElementById('jsonAnswers').value;

            if(!examCode || !jsonStr) return alert("Thầy điền đủ mã đề và JSON đáp án đã!");

            try {
                const res = await fetch('/api/v1/ocr/answers/save', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ examCode: examCode, answersJson: jsonStr })
                });
                if(res.ok) alert("✅ Đã nạp thành công đáp án đề " + examCode);
            } catch (err) { alert("❌ Lỗi nạp đáp án!"); }
        }

        // 3. Chấm điểm hàng loạt
        async function uploadFiles() {
            const fileInput = document.getElementById('fileInput');
            const examCode = document.getElementById('examCode').value;
            const btn = document.getElementById('btnAction');
            const body = document.getElementById('resultBody');
            
            if (fileInput.files.length === 0) return alert("Thầy chọn folder bài thi đã!");

            btn.innerHTML = `<i class="fas fa-spinner fa-spin"></i> Đang chấm... Hệ thống sẽ hoàn tất trong giây lát`;
            btn.disabled = true;
            document.getElementById('resultContainer').classList.remove('hidden');
            body.innerHTML = "";

            const formData = new FormData();
            for (let file of fileInput.files) { formData.append('files', file); }
            formData.append('examCode', examCode);

            try {
                const response = await fetch('/api/v1/ocr/upload-batch', { method: 'POST', body: formData });
                const results = await response.json();

                for (let res of results) {
                    const tr = document.createElement('tr');
                    tr.className = "border-b hover:bg-slate-50 transition-colors";
                    tr.innerHTML = `
                        <td class="p-4 font-semibold text-slate-700">${res.studentName}</td>
                        <td class="p-4 text-center text-2xl font-black text-blue-600">${res.score}</td>
                        <td class="p-4 text-xs text-slate-500 italic leading-relaxed" id="feedback-${res.ocrResultId}">
                            <span class="animate-pulse">AI đang phân tích bài làm...</span>
                        </td>
                        <td class="p-4 text-center">
                            <a href="/api/v1/ocr/export/pdf/${res.ocrResultId}" target="_blank" 
                               class="text-blue-500 hover:text-blue-700 text-sm font-bold border border-blue-200 px-3 py-1 rounded-md hover:bg-blue-50">
                               <i class="fas fa-file-pdf"></i> In Phiếu
                            </a>
                        </td>
                    `;
                    body.appendChild(tr);

                    // Lấy nhận xét AI riêng lẻ
                    fetch(`/api/v1/ocr/analyze/${res.ocrResultId}`)
                        .then(r => r.json())
                        .then(d => {
                            document.getElementById(`feedback-${res.ocrResultId}`).innerText = d.feedback;
                        });
                }
            } catch (error) {
                alert("❌ Lỗi kết nối server!");
            } finally {
                btn.innerHTML = `<i class="fas fa-check-double"></i> HOÀN TẤT CHẤM ĐIỂM`;
                btn.disabled = false;
            }
        }

        // 4. Xuất Excel
        function downloadExcel() {
            const examCode = document.getElementById('examCode').value;
            window.location.href = `/api/v1/ocr/export/excel/${examCode}`;
        }

        // 5. AI Phân tích lớp
        async function generateClassReport() {
            const examCode = document.getElementById('examCode').value;
            const res = await fetch(`/api/v1/ocr/class-report/${examCode}`);
            const data = await res.json();
            alert("🧠 PHÂN TÍCH LỚP TỪ AI:\n\n" + data.strengthAnalysis);
        }
    </script>
</body>
</html>
