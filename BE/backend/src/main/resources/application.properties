spring.application.name=planbookai-backend
spring.jpa.open-in-view=false

# =====================
# MySQL datasource
# =====================
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/planbook_ai?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=UTF-8}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =====================
# JPA / Hibernate
# =====================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# =====================
# JWT
# =====================
jwt.secret=${JWT_SECRET:planbook-ai-super-secret-key-must-be-at-least-32-bytes-long}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# =====================
# CORS
# =====================
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000,http://127.0.0.1:5173}

# =====================
# Gemini AI
# =====================
gemini.api.key=${GEMINI_API_KEY:AIzaSyBVdCh_bVdbUznUro02X8KTABk5_vAlzIA}

# =====================
# File Upload (cho OCR batch)
# =====================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB

# =====================
# Server
# =====================
server.port=8080

# Refresh token TTL: 30 ngày
jwt.refresh-expiration-ms=${JWT_REFRESH_EXPIRATION_MS:2592000000}