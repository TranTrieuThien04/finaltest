spring.application.name=planbookai-backend
spring.jpa.open-in-view=false

# MySQL datasource
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/planbook_ai?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# JWT (simple student-project setup)
jwt.secret=${JWT_SECRET:change-this-to-a-long-random-secret-key-at-least-32-bytes}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# Comma-separated origins or patterns for browser clients (Vite default: 5173).
# In Docker behind a browser-reachable host, set CORS_ALLOWED_ORIGINS to that origin (e.g. http://localhost:80).
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
